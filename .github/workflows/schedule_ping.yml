name: Schedule Ping Test

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule ping
        run: |
          echo "Schedule ping fired"
          date -u
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
