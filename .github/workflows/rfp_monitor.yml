name: CxA RFP Monitor

on:
  schedule:
    - cron: "57 12 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Keyword mode (broad or medium)"
        required: false
        default: "broad"
        type: choice
        options:
          - broad
          - medium
      dry_run:
        description: "Dry run -- log only, no email, no state update"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      sources:
        description: "Sources to run (sam, utilities, states_direct, google_cse, all)"
        required: false
        default: "all"
      force_all:
        description: "Ignore seen-set and report all passing opportunities"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      send_email:
        description: "Send email digest"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  monitor:
    name: RFP Monitor Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RFP Monitor
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          SENDGRID_API_KEY: ${{ (github.event_name == 'schedule' || github.event.inputs.send_email == 'true') && secrets.SENDGRID_API_KEY || '' }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          mkdir -p scrapers
          touch scrapers/__init__.py

          CMD="python main.py"
          CMD="$CMD --mode ${{ github.event.inputs.mode || 'broad' }}"
          CMD="$CMD --sources ${{ github.event.inputs.sources || 'all' }}"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            CMD="$CMD --force-all"
          fi

          echo "Executing: $CMD"
          $CMD

      - name: Upload dashboard preview artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rfp-dashboard-preview
          path: docs/index.html
          if-no-files-found: warn

  deploy_pages:
    name: Deploy dashboard to GitHub Pages
    needs: monitor
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download dashboard preview artifact
        uses: actions/download-artifact@v4
        with:
          name: rfp-dashboard-preview
          path: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
